name: "Empower Reader"
version: "0.1.0"
slug: "empower_reader"
description: "Fetch Naperville Empower usage data and publish it to Home Assistant via MQTT discovery."
url: "https://gitlab.cohosted.io/root/empower-reader"
startup: "application"
boot: "auto"
init: false
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
options:
  empower_username: ""
  empower_password: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  poll_interval_minutes: 30
  headless: true
  try_headless_first: true
  login_url: "https://www.empowernaperville.com"
  dashboard_url: "https://www.empowernaperville.com/Dashboard"
  device_id: "empower_naperville"
  device_name: "Naperville Empower"
  discovery_prefix: "homeassistant"
schema:
  empower_username: str
  empower_password: str
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str?
  mqtt_password: str?
  poll_interval_minutes: int(5,1440)
  headless: bool
  try_headless_first: bool
  login_url: str
  dashboard_url: str
  device_id: str
  device_name: str
  discovery_prefix: str
